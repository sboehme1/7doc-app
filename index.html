<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="7 Days of Change - A 7-day self-leadership program.">
  <meta name="theme-color" content="#2C2824">
  <meta name="color-scheme" content="light dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="7DOC">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/logo.png">
  <title>7 Days of Change</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-row">
      <h1>7 <span>Days of Change</span></h1>
      <button class="header-journey-btn" id="header-journey-btn" onclick="go('journey')">Meine Reise</button>
    </div>
    <p class="header-subtitle" id="header-sub">Heimkehr zu dir selbst</p>
    <div class="lang-switch">
      <div class="lang-toggle">
        <button class="lang-opt active" id="lang-de" onclick="setLang('de')" title="Deutsch">
          <img src="img/flag-de.svg" alt="DE" class="flag-icon"> DE
        </button>
        <button class="lang-opt" id="lang-en" onclick="setLang('en')" title="English">
          <img src="img/flag-en.svg" alt="EN" class="flag-icon"> EN
        </button>
      </div>
    </div>
  </header>

  <div class="motivation-banner" id="motivation-banner"></div>
  <div style="text-align:center;padding:1.2rem 1rem;"><a href="https://sashandventures.com" target="_blank" rel="noopener" id="coaching-progress-link" class="coaching-progress-link">Persönliche Begleitung entdecken</a></div>

  <div class="progress-container">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="coaching-progress-wrap"></div>
    <div id="progress-upsell" class="progress-upsell" style="display:none;"></div>
    <div id="streak-path" style="display:none;" onclick="go('progress')" style="cursor:pointer;"></div>
    <div id="streak-card" class="streak-card" onclick="go('progress')" style="display:none;"></div>
  </div>

  <nav class="nav-container">
    <div class="journey-bar">
      <button class="journey-always-btn" id="journey-always-btn" onclick="go('journey')">
        &#127793; <span id="journey-btn-label">Mein Fortschritt</span>
      </button>
    </div>
    <div class="nav-scroll" id="nav-scroll"></div>
  </nav>

  <main class="main-content" id="main-content"></main>

  <button class="scroll-top" id="scroll-top" aria-label="Scroll to top">&#8593;</button>

  <footer class="app-footer">
    <div class="footer-logo">
      <img src="img/logo.png" alt="Sash and Ventures" class="footer-logo-img">
    </div>
    <p>&copy; 2026 Sascha B&ouml;hme &middot; <a href="https://sashandventures.com" target="_blank" rel="noopener">sashandventures.com</a></p>
    <p style="margin-top:6px;font-size:0.73rem;" id="footer-disc"></p>
    <p style="margin-top:8px;"><a href="#" id="footer-add-code" onclick="showAddCodeModal();return false;" style="color:#c0845a;font-size:0.85rem;text-decoration:underline;cursor:pointer;"></a></p>
  </footer>

  <div id="upsell-overlay" class="upsell-overlay" style="display:none;"></div>
  <div id="add-code-overlay" class="upsell-overlay" style="display:none;"></div>

<div id="mood-overlay" onclick="if(event.target===this)closeMood();">
  <div class="mood-popup">
    <div class="mood-label" id="mood-label">Dein Check-In ✦</div>
    <div class="mood-question" id="mood-question">Wie geht es dir gerade?</div>
    <div class="mood-emojis">
      <span class="mood-emoji" onclick="saveMood(1)">😔</span>
      <span class="mood-emoji" onclick="saveMood(2)">😐</span>
      <span class="mood-emoji" onclick="saveMood(3)">🙂</span>
      <span class="mood-emoji" onclick="saveMood(4)">😊</span>
      <span class="mood-emoji" onclick="saveMood(5)">✨</span>
    </div>
    <div class="mood-hint" id="mood-hint">Tippe ein Emoji — fertig.</div>
    <button class="mood-skip" onclick="closeMood()" id="mood-skip">Überspringen</button>
  </div>
</div>
<div id="breath-popup-overlay" onclick="if(event.target===this)closeBreathPopup();">
  <div class="breath-popup-b">
    <div class="bp-sub" id="bpSub">ATEMÜBUNG · TAG 1</div>
    <div class="bp-title" id="bpTitle">Ankommen &amp; Atmen</div>
    <div class="breath-stage">
      <div class="breath-ring-outer" id="bRingOuter"></div>
      <div class="breath-ring-inner" id="bRingInner"></div>
      <div class="breath-center-count" id="bCount">—</div>
    </div>
    <div class="bp-chips">
      <span class="bp-chip" id="bChip1">4s ein</span>
      <span class="bp-chip" id="bChip2">4s halten</span>
      <span class="bp-chip" id="bChip3">6s aus</span>
    </div>
    <div class="breath-phase" id="bPhase">Bereit</div>
    <div class="breath-cycles" id="bCycles">5 Zyklen</div>
    <div class="breath-done" id="bDone" style="display:none;">✦ Gut gemacht</div>
    <button class="bp-btn-start" id="bBtn" onclick="startBreath()">Starten</button>
    <button class="bp-btn-close" onclick="closeBreathPopup()">Schließen</button>
  </div>
</div>

  <div id="update-banner" style="display:none;">
    <p id="update-text"></p>
    <button id="update-confirm"></button>
    <button id="update-dismiss"></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
